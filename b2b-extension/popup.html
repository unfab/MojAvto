<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      width: 280px;
      background: #f8fafc;
      color: #1e293b;
    }
    .header {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      padding: 1rem 1.25rem;
      color: #fff;
    }
    .header h1 { font-size: 1rem; font-weight: 800; }
    .header p  { font-size: 0.72rem; opacity: 0.8; margin-top: 2px; }
    .body { padding: 1rem 1.25rem; }
    #status {
      font-size: 0.78rem;
      color: #64748b;
      margin-bottom: 0.75rem;
      min-height: 1.1rem;
    }
    #status.ok    { color: #16a34a; font-weight: 600; }
    #status.error { color: #dc2626; font-weight: 600; }
    button {
      width: 100%;
      padding: 0.75rem 1rem;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: 0.65rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover   { opacity: 0.88; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .hint {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 0.6rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚗 MojAvto — B2B</h1>
    <p>Uvozni kalkulator profitabilnosti</p>
  </div>
  <div class="body">
    <div id="status">Preverjam stran...</div>
    <button id="analyzeBtn" disabled>Analiziraj uvoz v MojAvto</button>
    <p class="hint">Deluje samo na oglasih Mobile.de</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
