<!DOCTYPE html>
<html lang="sl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MojAvto.si — Slovenian car marketplace. Buy, sell and showcase your car." />
  <title>MojAvto.si — Prodaja in nakup avtomobilov</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <!-- Leaflet Maps -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Global CSS -->
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/auth.css" />

</head>

<body>
  <!-- Animated Background Blobs -->
  <div class="bg-blobs z-0">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Header injected by header.js -->
  <div id="header"></div>

  <!-- SPA view container -->
  <main id="app-container"></main>

  <!-- Footer injected by footer.js -->
  <div id="footer"></div>

  <!-- App entry point (Vite uses this) -->
  <script type="module" src="/main.js"></script>

  <!-- Lucide Icons Vector library -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Leaflet Maps JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>

</html>
