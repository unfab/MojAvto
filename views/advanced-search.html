<div class="search-container" style="max-width:1200px; margin:2rem auto; padding:0 1rem;">
    <h1>Napredno iskanje</h1>
    <form id="advancedSearchForm">
        <section class="filter-section">
            <h3><i class="fas fa-car"></i> Osnovni podatki</h3>
            <div class="filter-content">
                <div class="form-row">
                    <div class="form-group">
                        <label for="make">Znamka</label>
                        <select id="make" name="make">
                            <option value="">Vse znamke</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="model">Model</label>
                        <select id="model" name="model" disabled>
                            <option value="">Vsi modeli</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>
        <section class="filter-section">
            <h3><i class="fas fa-sliders-h"></i> Cena, letnik, kilometri</h3>
            <div class="filter-content">
                <div class="form-row">
                    <div class="form-group">
                        <label>Cena od (€)</label>
                        <input type="number" name="priceFrom" placeholder="Od">
                    </div>
                    <div class="form-group">
                        <label>Cena do (€)</label>
                        <input type="number" name="priceTo" placeholder="Do">
                    </div>
                    <div class="form-group">
                        <label for="year-from">Letnik od</label>
                        <select id="year-from" name="yearFrom">
                            <option value="">Vse</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="year-to">Letnik do</label>
                        <select id="year-to" name="yearTo">
                            <option value="">Vse</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="mileage-to">Prevoženi km do</label>
                        <input type="number" id="mileage-to" name="mileageTo" placeholder="Neomejeno">
                    </div>
                </div>
            </div>
        </section>
        <section class="filter-section">
            <h3><i class="fas fa-cogs"></i> Tehnični podatki</h3>
            <div class="filter-content">
                <div class="form-row">
                    <div class="form-group">
                        <label for="fuel">Vrsta goriva</label>
                        <select id="fuel" name="fuel">
                            <option value="">Vse</option>
                            <option value="Bencin">Bencin</option>
                            <option value="Dizel">Dizel</option>
                            <option value="Elektrika">Elektrika</option>
                            <option value="Hibrid">Hibrid</option>
                            <option value="Plin">Plin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="transmission">Menjalnik</label>
                        <select id="transmission" name="transmission">
                            <option value="">Vse</option>
                            <option value="Ročni">Ročni</option>
                            <option value="Avtomatski">Avtomatski</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <div class="search-actions" style="margin-top:20px; text-align:right;">
            <button type="reset" class="btn btn-secondary" style="margin-right:10px;">Ponastavi filtre</button>
            <button type="submit" class="btn btn-primary" id="searchBtn">Prikaži rezultate</button>
        </div>
    </form>
</div>

<div class="page-container" style="max-width:1200px; margin:2rem auto; padding:0 1rem; display:none;"
    id="results-wrapper">
    <h2>Rezultati iskanja (<span id="results-count">0</span>)</h2>
    <div class="listings-grid" id="search-results-container"
        style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:1.5rem; margin-top:20px;">
        <!-- Injected via JS -->
    </div>
</div>
