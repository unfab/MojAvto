<style>
    .adv-title-wrapper { display: flex; justify-content: center; width: 100%; margin-bottom: 2.5rem; }
    .hero-title { text-align: center !important; margin: 0 !important; }
    #group-bodyType { order: -1; }
    .adv-acc-body { flex-direction: column; }

    /* Multi-brand chips */
    .brand-chips-container { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    .brand-chip { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.75rem; border-radius: 99px; background: linear-gradient(135deg, var(--color-primary-start), var(--color-primary-end)); color: #fff; font-size: 0.85rem; font-weight: 600; animation: chipIn 0.2s ease; }
    .brand-chip .chip-remove { cursor: pointer; background: rgba(255,255,255,0.3); border: none; color: #fff; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 14px; line-height: 1; transition: background 0.15s; }
    .brand-chip .chip-remove:hover { background: rgba(255,255,255,0.5); }
    @keyframes chipIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .brand-add-row { display: flex; gap: 0.5rem; align-items: flex-end; }
    .brand-add-row .adv-field-group { flex: 1; margin-bottom: 0; }
    .brand-limit-note { font-size: 0.78rem; color: #9ca3af; margin-top: 0.25rem; }

    /* Hybrid sub-options */
    .hybrid-sub-options { display: none; padding: 0.5rem 0 0 1.5rem; width: 100%; gap: 0.5rem; }
    .hybrid-sub-options.visible { display: flex; flex-wrap: wrap; }

    .vehicle-entry-card {
        display: inline-flex; align-items: center; justify-content: space-between;
        padding: 0.25rem 0.75rem; border-radius: 99px;
        background: linear-gradient(135deg, var(--color-primary-start), var(--color-primary-end));
        color: #fff; font-size: 0.75rem; font-weight: 600;
        animation: chipIn 0.2s ease;
        width: fit-content;
        height: 28px;
    }
    .vehicle-entry-card .vec-info { display: flex; gap: 0.3rem; align-items: center; }
    .vehicle-entry-card .vec-sep { opacity: 0.5; font-size: 0.7rem; }
    .vehicle-entry-card .vec-remove {
        cursor: pointer; background: rgba(255,255,255,0.2); border: none; color: #fff;
        border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center;
        justify-content: center; font-size: 12px; transition: background 0.15s; flex-shrink: 0;
        margin-left: 0.4rem;
    }
    .vehicle-entry-card .vec-remove:hover { background: rgba(255,255,255,0.35); }

    /* Standard adv chips - make them pill-shaped and smaller */
    .adv-chip {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.35rem 0.9rem; border-radius: 99px;
        background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.08);
        font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
    }
    .adv-chip:hover { background: rgba(255,255,255,0.8); }
    .adv-chip input { margin: 0; }
    body.dark-mode .adv-chip { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: #e2e8f0; }
</style>
<div class="search-container" style="max-width:1060px; margin:3rem auto; padding:0 1rem;">
    <div class="adv-title-wrapper">
        <h1 class="hero-title">Napredno <span class="text-gradient">iskanje</span></h1>
    </div>

    <!-- Vehicle Type Tabs -->
    <div class="glass-tabs" style="display:flex; justify-content:center; gap:0.5rem; margin-bottom:2rem; background:rgba(255,255,255,0.4); backdrop-filter:blur(10px); padding:0.5rem; border-radius:99px; width:fit-content; margin-inline:auto;">
        <button type="button" class="tab-btn active" title="Avtomobili" style="padding:0.75rem 2rem; border-radius:99px; border:none; background:white; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:0.5rem; box-shadow:0 2px 8px rgba(0,0,0,0.05); transition:all 0.2s;"><i data-lucide="car"></i> Avtomobili</button>
        <button type="button" class="tab-btn" title="Motorji" style="padding:0.75rem 2rem; border-radius:99px; border:none; background:transparent; color:#6b7280; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:0.5rem; transition:all 0.2s;"><i data-lucide="bike"></i> Motorji</button>
        <button type="button" class="tab-btn" title="Gospodarska vozila" style="padding:0.75rem 2rem; border-radius:99px; border:none; background:transparent; color:#6b7280; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:0.5rem; transition:all 0.2s;"><i data-lucide="truck"></i> Gospodarska</button>
    </div>

    <form id="advancedSearchForm" data-v="2">

        <!-- ══ 1. OSNOVNI PODATKI ═══════════════════════════════════════ -->
        <div class="adv-accordion glass-card" style="border-radius:2rem; margin-bottom:1rem; overflow:hidden;">
            <div class="adv-acc-header">
                <button type="button" class="adv-acc-trigger" aria-expanded="true">
                    <span class="adv-acc-title"><i data-lucide="clipboard-list"></i> Osnovni podatki</span>
                    <div class="adv-acc-right">
                        <label class="remember-toggle" title="Zapomni si izbiro" onclick="event.stopPropagation()">
                            <span class="toggle-label">Zapomni si</span>
                            <input type="checkbox" class="remember-check" data-category="osnovni">
                            <span class="toggle-slider"></span>
                        </label>
                        <i data-lucide="chevron-down" class="adv-acc-chevron"></i>
                    </div>
                </button>
            </div>
            <div class="adv-acc-body" style="display:flex;">
                <!-- Body Type -->
                <div class="adv-field-group" id="group-bodyType">
                    <label class="adv-label">Karoserija</label>
                    <input type="hidden" name="bodyType" id="bodyTypeHidden" value="">
                    <div class="body-type-grid" id="grid-cars" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 1rem;">
                        <button type="button" class="body-type-card" data-value="Limuzina"><i data-lucide="car-front"></i><span>Limuzina</span></button>
                        <button type="button" class="body-type-card" data-value="Kombilimuzina"><i data-lucide="car"></i><span>Kombi&shy;limuzina</span></button>
                        <button type="button" class="body-type-card" data-value="Karavan"><i class="fas fa-truck-pickup"></i><span>Karavan</span></button>
                        <button type="button" class="body-type-card" data-value="Terensko"><i class="fas fa-car-side"></i><span>SUV / Terensko</span></button>
                        <button type="button" class="body-type-card" data-value="Enoprostorec"><i class="fas fa-shuttle-van"></i><span>Van</span></button>
                        <button type="button" class="body-type-card" data-value="Kabriolet"><i data-lucide="wind"></i><span>Kabriolet</span></button>
                        <button type="button" class="body-type-card" data-value="Coupe"><i class="fas fa-car"></i><span>Coupe</span></button>
                        <button type="button" class="body-type-card" data-value="Sportni"><i data-lucide="zap"></i><span>Športni</span></button>
                    </div>
                    <div class="body-type-grid" id="grid-motorbikes" style="display:none; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 1rem;">
                        <button type="button" class="body-type-card" data-value="Sport"><i class="fas fa-motorcycle"></i><span>Športni</span></button>
                        <button type="button" class="body-type-card" data-value="Naked"><i class="fas fa-motorcycle"></i><span>Naked</span></button>
                        <button type="button" class="body-type-card" data-value="Chopper"><i class="fas fa-motorcycle"></i><span>Chopper</span></button>
                        <button type="button" class="body-type-card" data-value="Enduro"><i class="fas fa-motorcycle"></i><span>Enduro</span></button>
                        <button type="button" class="body-type-card" data-value="Scooter"><i class="fas fa-motorcycle"></i><span>Skuter</span></button>
                    </div>
                    <div class="body-type-grid" id="grid-commercial" style="display:none; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 1rem;">
                        <button type="button" class="body-type-card" data-value="Kombi"><i class="fas fa-shuttle-van"></i><span>Kombi</span></button>
                        <button type="button" class="body-type-card" data-value="Tovornjak"><i class="fas fa-truck"></i><span>Tovornjak</span></button>
                        <button type="button" class="body-type-card" data-value="Pick-up"><i class="fas fa-truck-pickup"></i><span>Pick-up</span></button>
                    </div>
                </div>

                <!-- Condition checkboxes -->
                <div class="adv-field-group">
                    <label class="adv-label">Stanje vozila</label>
                    <div class="adv-chip-group">
                        <label class="adv-chip"><input type="checkbox" name="condition" value="Novo"> Novo</label>
                        <label class="adv-chip"><input type="checkbox" name="condition" value="Rabljeno"> Rabljeno</label>
                        <label class="adv-chip"><input type="checkbox" name="condition" value="Razstavno"> Razstavno vozilo</label>
                        <label class="adv-chip"><input type="checkbox" name="condition" value="DnevnaRegistracija"> Dnevna registracija</label>
                        <label class="adv-chip"><input type="checkbox" name="condition" value="Starodobnik"> Starodobnik</label>
                    </div>
                </div>

                <!-- Damaged vehicle toggle -->
                <div class="adv-field-group">
                    <label class="adv-label">Poškodovana vozila</label>
                    <div class="adv-chip-group">
                        <label class="adv-chip"><input type="radio" name="damaged" value=""> Vsa</label>
                        <label class="adv-chip"><input type="radio" name="damaged" value="only"> Samo poškodovana</label>
                        <label class="adv-chip"><input type="radio" name="damaged" value="exclude"> Izključi poškodovana</label>
                    </div>
                </div>

                <!-- Vehicle Selector (up to 3 vehicles) -->
                <div class="adv-field-group">
                    <label class="adv-label">Iskana vozila (do 3)</label>
                    <div id="vehicleSelectorRow" class="adv-grid-3" style="margin-bottom:0.75rem;">
                        <div class="adv-field-group" style="margin-bottom:0;">
                            <select id="make" class="glass-select"><option value="">Znamka</option></select>
                        </div>
                        <div class="adv-field-group" style="margin-bottom:0;">
                            <select id="model" disabled class="glass-select"><option value="">Model</option></select>
                        </div>
                        <div class="adv-field-group" style="margin-bottom:0;">
                            <select id="variant" disabled class="glass-select"><option value="">Različica</option></select>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1rem;">
                        <button type="button" id="addVehicleBtn" class="pill-btn primary" style="height:28px; padding:0 1.2rem; font-size:0.75rem; width:fit-content; border-radius:99px;">
                            <i data-lucide="plus" style="width:14px;height:14px;"></i> Dodaj
                        </button>
                        <p class="brand-limit-note" id="brandLimitNote" style="margin:0;"></p>
                    </div>
                    <div id="vehicleCards" style="display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:1.5rem;"></div>
                </div>

                <!-- Exclude brands -->
                <div class="adv-field-group">
                    <label class="adv-label">Izloči znamko</label>
                    <div class="brand-chips-container" id="excludeChips"></div>
                    <div class="brand-add-row">
                        <div class="adv-field-group">
                            <select id="excludeMake" class="glass-select"><option value="">+ Izloči znamko</option></select>
                        </div>
                    </div>
                </div>

                <!-- Price -->
                <div class="adv-grid-2">
                    <div class="adv-field-group">
                        <label class="adv-label">Cena od (€)</label>
                        <input type="number" name="priceFrom" placeholder="0 €" class="adv-input">
                    </div>
                    <div class="adv-field-group">
                        <label class="adv-label">Cena do (€)</label>
                        <input type="number" name="priceTo" placeholder="Neomejeno" class="adv-input">
                    </div>
                </div>
                <div class="adv-field-group">
                    <label class="adv-chip" style="width:fit-content;"><input type="checkbox" name="hideVAT" value="1"> Prikaži cene brez DDV</label>
                </div>

                <!-- First Registration -->
                <div class="adv-grid-2">
                    <div class="adv-field-group">
                        <label class="adv-label" for="year-from">1. registracija od</label>
                        <select id="year-from" name="yearFrom" class="glass-select"><option value="">Vse</option></select>
                    </div>
                    <div class="adv-field-group">
                        <label class="adv-label" for="year-to">1. registracija do</label>
                        <select id="year-to" name="yearTo" class="glass-select"><option value="">Vse</option></select>
                    </div>
                </div>

                <!-- Mileage -->
                <div class="adv-grid-2">
                    <div class="adv-field-group">
                        <label class="adv-label">Kilometri od</label>
                        <input type="number" name="mileageFrom" placeholder="0 km" class="adv-input">
                    </div>
                    <div class="adv-field-group">
                        <label class="adv-label" for="mileage-to">Kilometri do</label>
                        <input type="number" id="mileage-to" name="mileageTo" placeholder="Neomejeno" class="adv-input">
                    </div>
                </div>

            </div>
        </div>

        <!-- ══ 2. MOTOR IN POGON ════════════════════════════════════════ -->
        <div class="adv-accordion glass-card" style="border-radius:2rem; margin-bottom:1rem; overflow:hidden;">
            <div class="adv-acc-header">
                <button type="button" class="adv-acc-trigger" aria-expanded="false">
                    <span class="adv-acc-title"><i data-lucide="settings-2"></i> Motor in pogon</span>
                    <div class="adv-acc-right">
                        <label class="remember-toggle" title="Zapomni si izbiro" onclick="event.stopPropagation()">
                            <span class="toggle-label">Zapomni si</span>
                            <input type="checkbox" class="remember-check" data-category="motor">
                            <span class="toggle-slider"></span>
                        </label>
                        <i data-lucide="chevron-down" class="adv-acc-chevron"></i>
                    </div>
                </button>
            </div>
            <div class="adv-acc-body" style="display:none;">
                <div class="adv-field-group">
                    <label class="adv-label">Vrsta goriva</label>
                    <div class="adv-chip-group">
                        <label class="adv-chip"><input type="checkbox" name="fuel" value="Bencin"> Bencin</label>
                        <label class="adv-chip"><input type="checkbox" name="fuel" value="Dizel"> Dizel</label>
                        <label class="adv-chip"><input type="checkbox" name="fuel" value="Hibrid" id="fuelHybridCheck"> Hibrid</label>
                        <label class="adv-chip"><input type="checkbox" name="fuel" value="Elektrika"> Elektrika</label>
                        <label class="adv-chip"><input type="checkbox" name="fuel" value="LPG"> LPG / Plin</label>
                        <label class="adv-chip"><input type="checkbox" name="fuel" value="CNG"> CNG</label>
                        <label class="adv-chip"><input type="checkbox" name="fuel" value="Vodik"> Vodik</label>
                        <label class="adv-chip"><input type="checkbox" name="fuel" value="Etanol"> Etanol</label>
                    </div>
                    <div class="hybrid-sub-options" id="hybridSubOptions">
                        <label class="adv-chip"><input type="checkbox" name="hybridType" value="BencinHibrid"> Bencin hibrid</label>
                        <label class="adv-chip"><input type="checkbox" name="hybridType" value="DizelHibrid"> Dizel hibrid</label>
                        <label class="adv-chip"><input type="checkbox" name="hybridType" value="PlugIn"> Plug-in hibrid</label>
                        <label class="adv-chip"><input type="checkbox" name="hybridType" value="MildHibrid"> Mild hibrid</label>
                    </div>
                </div>

                <div class="adv-grid-2">
                    <div class="adv-field-group">
                        <label class="adv-label">Moč motorja od (kW)</label>
                        <input type="number" name="powerFrom" placeholder="0 kW" class="adv-input">
                    </div>
                    <div class="adv-field-group">
                        <label class="adv-label">Moč motorja do (kW)</label>
                        <input type="number" name="powerTo" placeholder="Neomejeno" class="adv-input">
                    </div>
                </div>

                <div class="adv-field-group">
                    <label class="adv-label">Menjalnik</label>
                    <div class="adv-chip-group">
                        <label class="adv-chip"><input type="checkbox" name="transmission" value="Ročni"> Ročni</label>
                        <label class="adv-chip"><input type="checkbox" name="transmission" value="Avtomatski"> Avtomatski</label>
                        <label class="adv-chip"><input type="checkbox" name="transmission" value="Polavtomatski"> Polavtomatski</label>
                    </div>
                </div>

                <div class="adv-grid-2">
                    <div class="adv-field-group">
                        <label class="adv-label">Delovna prostornina od (cm³)</label>
                        <input type="number" name="displacementFrom" placeholder="npr. 1200" class="adv-input">
                    </div>
                    <div class="adv-field-group">
                        <label class="adv-label">Delovna prostornina do (cm³)</label>
                        <input type="number" name="displacementTo" placeholder="npr. 3000" class="adv-input">
                    </div>
                </div>

                    <div class="adv-grid-2">
                        <div class="adv-field-group">
                            <label class="adv-label">Pogon</label>
                            <div class="adv-chip-group">
                                <label class="adv-chip"><input type="checkbox" name="drivetrain" value="FWD"> Sprednji (FWD)</label>
                                <label class="adv-chip"><input type="checkbox" name="drivetrain" value="RWD"> Zadnji (RWD)</label>
                                <label class="adv-chip"><input type="checkbox" name="drivetrain" value="AWD"> 4x4 / AWD</label>
                            </div>
                        </div>
                        <div class="adv-field-group">
                            <label class="adv-label">Poraba goriva do (l/100km)</label>
                            <input type="number" name="consumptionTo" placeholder="npr. 6.0" step="0.1" class="adv-input">
                        </div>
                    </div>
                </div>
            </div>



        <!-- ══ 4. ZUNANJOST ═════════════════════════════════════════════ -->
        <div class="adv-accordion glass-card" style="border-radius:2rem; margin-bottom:1rem; overflow:hidden;">
            <div class="adv-acc-header">
                <button type="button" class="adv-acc-trigger" aria-expanded="false">
                    <span class="adv-acc-title"><i data-lucide="palette"></i> Zunanjost</span>
                    <div class="adv-acc-right">
                        <label class="remember-toggle" title="Zapomni si izbiro" onclick="event.stopPropagation()">
                            <span class="toggle-label">Zapomni si</span>
                            <input type="checkbox" class="remember-check" data-category="zunanjost">
                            <span class="toggle-slider"></span>
                        </label>
                        <i data-lucide="chevron-down" class="adv-acc-chevron"></i>
                    </div>
                </button>
            </div>
            <div class="adv-acc-body" style="display:none;">
                <div class="adv-field-group">
                    <label class="adv-label">Število vrat</label>
                    <div class="adv-chip-group">
                        <label class="adv-chip"><input type="checkbox" name="doors" value="2/3"> 2 / 3 vrata</label>
                        <label class="adv-chip"><input type="checkbox" name="doors" value="4/5"> 4 / 5 vrat</label>
                        <label class="adv-chip"><input type="checkbox" name="doors" value="6/7"> 6 / 7 vrat</label>
                    </div>
                </div>

                <div class="adv-field-group">
                    <label class="adv-label">Barva karoserije</label>

                        <label class="adv-chip"><input type="checkbox" name="color" value="Bela"> Bela</label>

                        <label class="adv-chip"><input type="checkbox" name="color" value="Rumena"> Rumena</label>
                        <label class="adv-chip"><input type="checkbox" name="color" value="Oranžna"> Oranžna</label>
                        <label class="adv-chip"><input type="checkbox" name="color" value="Vijolična"> Vijolična</label>
                    </div>
                </div>

                <div class="adv-field-group">
                    <label class="adv-label">Vrsta barve</label>
                    <div class="adv-chip-group">
                        <label class="adv-chip"><input type="checkbox" name="paintwork" value="Metallic"> Kovinska (metallic)</label>
                        <label class="adv-chip"><input type="checkbox" name="paintwork" value="Navadna"> Navadna</label>
                        <label class="adv-chip"><input type="checkbox" name="paintwork" value="Pearl"> Biserna</label>
                        <label class="adv-chip"><input type="checkbox" name="paintwork" value="Mat"> Mat</label>
                    </div>
                </div>

                <div class="adv-field-group">
                    <label class="adv-label">Vlečna kljuka</label>
                    <div class="adv-chip-group">
                        <label class="adv-chip"><input type="checkbox" name="trailerCoupling" value="Fiksna"> Fiksna</label>
                        <label class="adv-chip"><input type="checkbox" name="trailerCoupling" value="Snemljiva"> Snemljiva</label>
                        <label class="adv-chip"><input type="checkbox" name="trailerCoupling" value="Vrtljiva"> Vrtljiva</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- ══ 5. NOTRANJOST IN UDOBJE ══════════════════════════════════ -->
        <div class="adv-accordion glass-card" style="border-radius:2rem; margin-bottom:1rem; overflow:hidden;">
            <div class="adv-acc-header">
                <button type="button" class="adv-acc-trigger" aria-expanded="false">
                    <span class="adv-acc-title"><i data-lucide="armchair"></i> Notranjost in udobje</span>
                    <div class="adv-acc-right">
                        <label class="remember-toggle" title="Zapomni si izbiro" onclick="event.stopPropagation()">
                            <span class="toggle-label">Zapomni si</span>
                            <input type="checkbox" class="remember-check" data-category="notranjost">
                            <span class="toggle-slider"></span>
                        </label>
                        <i data-lucide="chevron-down" class="adv-acc-chevron"></i>
                    </div>
                </button>
            </div>
            <div class="adv-acc-body" style="display:none;">
                <div class="adv-grid-2">
                    <div class="adv-field-group">
                        <label class="adv-label">Število sedežev od</label>
                        <input type="number" name="seatsFrom" placeholder="2" min="1" max="9" class="adv-input">
                    </div>
                    <div class="adv-field-group">
                        <label class="adv-label">Število sedežev do</label>
                        <input type="number" name="seatsTo" placeholder="9" min="1" max="9" class="adv-input">
                    </div>
                </div>

                <div class="adv-field-group">
                    <label class="adv-label">Material notranšjosti</label>
                    <div class="adv-chip-group">
                        <label class="adv-chip"><input type="checkbox" name="interior" value="Usnje"> Usnje</label>
                        <label class="adv-chip"><input type="checkbox" name="interior" value="DelnoUsnje"> Delno usnje</label>
                        <label class="adv-chip"><input type="checkbox" name="interior" value="Blago"> Blago</label>
                        <label class="adv-chip"><input type="checkbox" name="interior" value="Velur"> Velur</label>
                        <label class="adv-chip"><input type="checkbox" name="interior" value="Alcantara"> Alcantara</label>
                    </div>
                </div>

                <div class="adv-field-group">
                    <label class="adv-label">Klimatska naprava</label>
                    <div class="adv-chip-group">

                    <label class="adv-chip"><input type="checkbox" name="features" value="HUD"> Head-up display</label>
