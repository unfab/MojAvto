<style>
    .hero-title {
        text-align: center !important;
        margin: 0 !important;
    }

    #group-bodyType {
        order: -1;
        text-align: center;
    }

    .adv-acc-body {
        flex-direction: column;
    }

    .car-only-field,
    .moto-only-field {
        width: 100%;
        transition: opacity 0.2s;
    }

    /* Multi-brand chips */
    .brand-chips-container {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
    }

    .brand-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.4rem 0.75rem;
        border-radius: 99px;
        background: linear-gradient(135deg, var(--color-primary-start), var(--color-primary-end));
        color: #fff;
        font-size: 0.85rem;
        font-weight: 600;
        animation: chipIn 0.2s ease;
    }

    .brand-chip .chip-remove {
        cursor: pointer;
        background: rgba(255, 255, 255, 0.3);
        border: none;
        color: #fff;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        line-height: 1;
        transition: background 0.15s;
    }

    .brand-chip .chip-remove:hover {
        background: rgba(255, 255, 255, 0.5);
    }

    @keyframes chipIn {
        from {
            transform: scale(0.8);
            opacity: 0;
        }

        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    .brand-add-row {
        display: flex;
        gap: 0.5rem;
        align-items: flex-end;
    }

    .brand-add-row .adv-field-group {
        flex: 1;
        margin-bottom: 0;
    }

    .brand-limit-note {
        font-size: 0.78rem;
        color: #9ca3af;
        margin-top: 0.25rem;
    }

    /* Hybrid sub-options */
    .hybrid-sub-options {
        display: none;
        padding: 0.5rem 0 0 1.5rem;
        width: 100%;
        gap: 0.5rem;
    }

    .hybrid-sub-options.visible {
        display: flex;
        flex-wrap: wrap;
    }

    .vehicle-entry-card {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.25rem 0.75rem;
        border-radius: 99px;
        background: linear-gradient(135deg, var(--color-primary-start), var(--color-primary-end));
        color: #fff;
        font-size: 0.75rem;
        font-weight: 600;
        animation: chipIn 0.2s ease;
        width: fit-content;
        height: 28px;
    }

    .vehicle-entry-card .vec-info {
        display: flex;
        gap: 0.3rem;
        align-items: center;
    }

    .vehicle-entry-card .vec-sep {
        opacity: 0.5;
        font-size: 0.7rem;
    }

    .vehicle-entry-card .vec-remove {
        cursor: pointer;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: #fff;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        transition: background 0.15s;
        flex-shrink: 0;
        margin-left: 0.4rem;
    }

    .vehicle-entry-card .vec-remove:hover {
        background: rgba(255, 255, 255, 0.35);
    }






    /* Rental badge */
    .rental-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.2rem 0.6rem;
        border-radius: 99px;
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 700;
    }

    /* Search type pills */
    .search-type-pills {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        justify-content: center;
    }

    .search-type-pill {
        padding: 0.6rem 1.5rem;
        border-radius: 99px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        background: rgba(255, 255, 255, 0.5);
        font-size: 0.85rem;
        font-weight: 600;
        color: #4b5563;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .search-type-pill:hover,
    .search-type-pill.active {
        background: var(--color-primary-start);
        color: #fff;
        border-color: var(--color-primary-start);
    }

    body.dark-mode .search-type-pill {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.1);
        color: #94a3b8;
    }

    body.dark-mode .search-type-pill:hover,
    body.dark-mode .search-type-pill.active {
        background: var(--color-primary-start);
        color: #fff;
    }

    /* Remember toggle in search */
    .adv-remember-bar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 0.75rem;
        margin-bottom: 1rem;
    }

    #vehicleCards:empty {
        margin-bottom: 0 !important;
    }
</style>
