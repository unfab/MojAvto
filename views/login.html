<section class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <a href="#/">MojAvto<span class="logo-dot">.si</span></a>
        </div>
        <h1 class="auth-title">Prijava</h1>

        <button id="googleLoginBtn" class="btn-google">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
                    fill="#4285F4" />
                <path
                    d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"
                    fill="#34A853" />
                <path
                    d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"
                    fill="#FBBC05" />
                <path
                    d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"
                    fill="#EA4335" />
            </svg>
            Prijava z Google
        </button>

        <div class="auth-divider"><span>ali</span></div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="vas@email.com" required autocomplete="email" />
            </div>
            <div class="form-group">
                <label for="password">
                    Geslo
                    <a href="#/pozabljeno-geslo" class="forgot-link">Pozabljeno geslo?</a>
                </label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="••••••••" required
                        autocomplete="current-password" />
                    <button type="button" class="toggle-pw" aria-label="Pokaži geslo"><i
                            class="fas fa-eye"></i></button>
                </div>
            </div>

            <p id="error-message" class="auth-error" aria-live="polite"></p>

            <button type="submit" class="btn btn-primary btn-full">Prijava</button>
        </form>

        <p class="auth-switch">Nimaš računa? <a href="#/registracija">Registracija</a></p>
    </div>
</section>
