}

    padding: 1.75rem;

}

.oglasi-filters-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
}

.oglasi-filters-header h2 {

    color: #1e293b;
    margin: 0;
}

.oglasi-reset-btn {
    font-size: 0.8rem;
    font-weight: 600;

/* Payment toggle */

}

    border-radius: 9999px;
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: #64748b;
}

.payment-toggle button.active {
    background: white;
    color: var(--color-primary-start);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* Filter fields */
.filter-fields {
    display: flex;
    flex-direction: column;
    gap: 1.15rem;
}

.filter-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #475569;
    margin-bottom: 0.4rem;
    margin-left: 0.25rem;

    letter-spacing: 0.02em;
}

.filter-select-wrap {
    position: relative;
}

.filter-select {

    border: 1px solid #e2e8f0;
    color: #1e293b;

    font-family: 'Inter', sans-serif;

    padding: 0.75rem 2.5rem 0.75rem 1rem;

    cursor: pointer;
    transition: all 0.2s;
}

.filter-select:focus {

    border-color: var(--color-primary-start);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}

.filter-select-icon {

    right: 0.85rem;
    top: 50%;

    height: 16px;

    pointer-events: none;
}

.filter-row {
    display: flex;
    gap: 0.5rem;
}

.filter-row .filter-select-wrap {
    flex: 1;
}

/* Primary CTA */
.oglasi-search-btn {
    width: 100%;
    margin-top: 1.75rem;
    padding: 0.9rem 1.25rem;
    border-radius: 1rem;
    border: none;
    background: linear-gradient(135deg, #ea580c, #dc2626);

    font-weight: 700;
    font-family: 'Inter', sans-serif;

.oglasi-search-btn:hover {

}

/* ── Mobile filter toggle ────────────────────────────────── */

}

.mobile-filter-toggle i { color: var(--color-primary-start); }

/* ── Car Card ────────────────────────────────────────────── */

/* Image */
.car-listing-img {

}

.carousel-track {

.carousel-track img {

}

/* Carousel Buttons */
.carousel-btn {

    top: 50%;

    height: 32px;

    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: all 0.3s;
    z-index: 10;
}

.car-listing-img:hover .carousel-btn {
    opacity: 1;
}

.carousel-btn:hover {
    background: rgba(255,255,255,0.4);
    transform: translateY(-50%) scale(1.1);
}

.carousel-btn.prev { left: 10px; }
.carousel-btn.next { right: 10px; }
.carousel-btn i { width: 18px; height: 18px; }

/* Carousel Dots */
.carousel-dots {

.carousel-dots .dot {

    border-color: rgba(220, 38, 38, 0.3);

/* Spec Pills */

    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: 0.5rem 0;

.spec-pill {

}

.spec-pill i {

}

.car-listing-note {

.seller-avatar-mini {

}

}

.contact-popup-overlay.active { display: flex; }

.contact-popup-card {

}

    border-radius: 9999px;
    font-size: 0.82rem;
    font-weight: 700;
    font-family: 'Inter', sans-serif;

.contact-btn {

.contact-btn:hover {

.listing-compare-btn {
