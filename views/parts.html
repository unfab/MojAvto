<style>

.parts-content {}

.parts-card {

            <!-- Rendered by JS -->
        </aside>

        <!-- ── Content area ───────────────────────────────────────────── -->
        <div class="parts-content" id="parts-content">

            <!-- Search + sort bar -->
            <div class="parts-search-sort">
                <div class="parts-search-input-wrap">
                    <i data-lucide="search"></i>
                    <input type="text" id="parts-search-input" placeholder="Išči del, znamko, OEM številko…">
                </div>
                <select class="parts-sort-select" id="parts-sort">
                    <option value="newest">Najnovejši</option>
                    <option value="price_asc">Cena ↑</option>
                    <option value="price_desc">Cena ↓</option>
                    <option value="compat">Kompatibilnost</option>
                </select>
                <span class="parts-results-count" id="parts-results-count"></span>
            </div>

            <!-- Filter bar (shown when subcategory is selected) -->
            <div class="parts-filter-bar" id="parts-filter-bar" style="display:none;">
                <!-- Dynamic filters rendered by JS -->
            </div>

            <!-- Subcategory pills (shown when top-category is selected) -->
            <div class="parts-subcat-pills" id="parts-subcat-pills" style="display:none;"></div>

            <!-- Brand row (shown when subcategory has brands) -->
            <div class="parts-brand-row" id="parts-brand-row" style="display:none;"></div>

            <!-- Main display area: browse grid OR results -->
            <div id="parts-main-display">
                <!-- Browse grid shown by default -->
                <div class="parts-browse-grid" id="parts-browse-grid"></div>
                <!-- Results grid shown after category/vehicle selection -->
                <div class="parts-results-grid" id="parts-results-grid" style="display:none;"></div>
                <!-- Loading -->
                <div class="parts-loading" id="parts-loading" style="display:none;">
                    <div class="parts-loading-spinner"></div> Iščem dele…
                </div>
                <!-- Empty state -->
                <div class="parts-empty" id="parts-empty" style="display:none;">
                    <i data-lucide="package-x" style="width:48px;height:48px;"></i>
                    <p>Ni zadetkov</p>
                    <small>Poskusi z drugačnimi filtri ali razširi iskanje.</small>
                </div>
            </div>

            <!-- Cross-sell section -->
            <div class="parts-crosssell" id="parts-crosssell" style="display:none;">
                <div class="parts-crosssell-title">
                    <i data-lucide="sparkles"></i> Mogoče te zanima tudi
                </div>
                <div class="parts-crosssell-pills" id="parts-crosssell-pills"></div>
            </div>

            <!-- Pagination -->
            <div class="parts-pagination" id="parts-pagination"></div>
        </div>
    </div>
</div>
